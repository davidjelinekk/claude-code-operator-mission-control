services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: cc_operator
      POSTGRES_USER: operator
      POSTGRES_PASSWORD: operator
    ports:
      - "5434:5432"
    volumes:
      - cc_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - cc_redis_data:/data

volumes:
  cc_pg_data:
  cc_redis_data:
